<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - User Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass auth-box">
            <div class="auth-logo">AdminPro</div>
            <h2 style="margin-bottom: 24px; text-align: center; font-size: 1.1rem; color: var(--text-muted);">Sign in to your account</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Sign In</button>
                <button class="auth-tab" id="tab-register">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="form-login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 10px;"></div>
                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required minlength="8" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required minlength="8" placeholder="••••••••">
                </div>
                <div id="reg-error" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 10px;"></div>
                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </form>
        </div>
    </div>
    <script src="/static/auth-guard.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
