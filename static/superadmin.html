<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Admin - User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                AdminPro
            </div>
            <nav class="sidebar-nav">
                <a href="/superadmin.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="/users.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Users & Admins
                </a>
                <a href="/admins.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 11l-3 3-1.5-1.5"></path></svg>
                    Admins
                </a>
                <a href="/roles.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Roles & Permissions
                </a>
                <a href="/reports.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Reports
                </a>
                <a href="/profile.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div style="font-weight: 600; color: var(--text-muted);">Super Admin Portal</div>
                <div class="topbar-right">
                    <div class="user-info">
                        <div class="avatar" id="topbar-avatar">S</div>
                        <div class="user-details">
                            <div class="username" id="topbar-name">Super Admin</div>
                            <div class="role-badge" id="topbar-role">Super Admin</div>
                        </div>
                    </div>
                    <button class="btn-ghost" id="btn-logout">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header glass">
                    <div style="padding: 24px;">
                        <h1 id="welcome-msg">Welcome, Super Admin</h1>
                        <p>Complete control over the User Management System.</p>
                    </div>
                </div>

                <div class="grid-cards">
                    <div class="stat-card glass">
                        <div class="stat-title">Total Users</div>
                        <div class="stat-value" id="stat-users">...</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-title">Total Admins</div>
                        <div class="stat-value" id="stat-admins">...</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-title">Active Sessions</div>
                        <div class="stat-value" id="stat-sessions">...</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-title">Reports Generated</div>
                        <div class="stat-value" id="stat-reports">...</div>
                    </div>
                </div>

                <div class="glass" style="padding: 32px;">
                    <h2 style="margin-bottom: 24px; font-weight: 600;">System Activity</h2>
                    <canvas id="activityChart" height="80"></canvas>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/auth-guard.js"></script>
    <script src="/static/dashboard.js"></script>
</body>
</html>
