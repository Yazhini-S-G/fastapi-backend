<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                AdminPro
            </div>
            <nav class="sidebar-nav">
                <!-- Using AuthGuard dynamic hide logic to show/hide menus based on role context would be tricky here because profile is shared. We can just rely on the 'Back to Dashboard' button or add basic navigation. -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div style="font-weight: 600; color: var(--text-muted);">Account Profile</div>
                <div class="topbar-right">
                    <div class="user-info">
                        <div class="avatar" id="topbar-avatar"></div>
                        <div class="user-details">
                            <div class="username" id="topbar-name"></div>
                            <div class="role-badge" id="topbar-role"></div>
                        </div>
                    </div>
                    <button class="btn-ghost" id="btn-logout">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header glass" style="padding: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div>
                            <h1>My Profile</h1>
                            <p>Manage your account settings and password.</p>
                        </div>
                        <button id="btn-back-dashboard" class="btn-ghost" style="border: 1px solid var(--panel-border);">
                            ← Back to Dashboard
                        </button>
                    </div>
                </div>

                <div class="grid-cards" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
                    <!-- Profile Info -->
                    <div class="glass" style="padding: 32px; display: flex; align-items: center; gap: 32px;">
                        <div class="avatar" id="profile-avatar" style="width: 100px; height: 100px; font-size: 2.5rem;"></div>
                        <div>
                            <h2 id="profile-name" style="margin-bottom: 8px; font-size: 1.8rem;">Loading profile...</h2>
                            <p id="profile-email" style="color: var(--text-muted); margin-bottom: 16px; font-size: 1.1rem;"></p>
                            <div style="display: flex; gap: 12px;">
                                <span class="badge badge-primary" id="profile-role-badge"></span>
                                <span class="badge badge-success" id="profile-status">Active</span>
                            </div>
                        </div>
                    </div>

                    <!-- Change Password -->
                    <div class="glass" style="padding: 32px;">
                        <h3 style="margin-bottom: 24px; font-weight: 600;">Change Password</h3>
                        <form id="form-change-pwd">
                            <div class="form-group">
                                <label for="cp-old">Current Password</label>
                                <input type="password" id="cp-old" required>
                            </div>
                            <div class="form-group">
                                <label for="cp-new">New Password</label>
                                <input type="password" id="cp-new" required minlength="8">
                            </div>
                            <div class="form-group">
                                <label for="cp-confirm">Confirm New Password</label>
                                <input type="password" id="cp-confirm" required minlength="8">
                            </div>
                            <div id="cp-msg" style="margin-bottom: 16px; font-size: 0.9rem;"></div>
                            <button type="submit" class="btn-primary">Update Password</button>
                        </form>
                    </div>

                    <!-- Reset Password (Token Based) -->
                    <div class="glass" style="padding: 32px;">
                        <h3 style="margin-bottom: 16px; font-weight: 600;">Reset Password (Via Token)</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">Use this form if you have received a reset token.</p>
                        <form id="form-reset-pwd">
                            <div class="form-group">
                                <label for="rp-token">Reset Token</label>
                                <input type="text" id="rp-token" required>
                            </div>
                            <div class="form-group">
                                <label for="rp-new">New Password</label>
                                <input type="password" id="rp-new" required minlength="8">
                            </div>
                            <div class="form-group">
                                <label for="rp-confirm">Confirm New Password</label>
                                <input type="password" id="rp-confirm" required minlength="8">
                            </div>
                            <div id="rp-msg" style="margin-bottom: 16px; font-size: 0.9rem;"></div>
                            <button type="submit" class="btn-danger">Reset Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/auth-guard.js"></script>
    <script src="/static/profile.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnBack = document.getElementById('btn-back-dashboard');
            if (btnBack) {
                btnBack.addEventListener('click', () => {
                    const user = AuthGuard.getUser();
                    if (user) {
                        if (user.roles.includes('Super Admin')) {
                            window.location.href = '/superadmin.html';
                        } else if (user.roles.includes('Admin')) {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/dashboard.html';
                        }
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                });
            }
            
            // To prevent sidebar from being empty and confusing, we can just fetch and hide the sidebar 
            // completely for profile, or let the Back button do the work.
            const sidebarNav = document.querySelector('.sidebar-nav');
            if(sidebarNav) {
                sidebarNav.innerHTML = `
                    <a href="javascript:void(0)" class="nav-item active" onclick="document.getElementById('btn-back-dashboard').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profile Settings
                    </a>
                `;
            }
        });
    </script>
</body>
</html>
